<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VicThree Defence — Mock Tests</title>
  <meta name="description" content="Free timed mock tests — VicThree Defence by Anmol Sharma." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ============ HEADER / BANNER ============ -->
  <!-- Drop a banner image at docs/assets/banner.png and it shows automatically. -->
  <header class="site-header">
    <div class="banner-wrap">
      <img id="bannerImg" src="assets/banner.png" alt="VicThree Defence banner"
           onerror="this.style.display='none'; document.getElementById('brandText').style.display='flex';" />
      <div id="brandText" class="brand-text">
        <div class="brand-mark">V3</div>
        <div class="brand-lines">
          <span class="brand-title">VicThree Defence</span>
          <span class="brand-sub">by Anmol Sharma</span>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="home-intro">
      <h1>Mock Test Library</h1>
      <p class="muted">Choose a test below. Each is timed and auto-submits at time-up.</p>
    </div>

    <div id="testList" class="test-list">
      <!-- cards injected by home.js -->
      <p id="testListMsg" class="muted">Loading tests…</p>
    </div>
  </main>

  <footer class="site-footer">
    VicThree Defence · Mock Tests
  </footer>

  <script src="home.js"></script>
</body>
</html>
